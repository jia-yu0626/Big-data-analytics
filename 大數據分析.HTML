<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖書館採購與需求匹配分析 - 數據儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .chart-container { position: relative; height: 350px; width: 100%; }
        .kpi-card { transition: transform 0.3s; }
        .kpi-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <header class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center">
            <h1 class="text-2xl font-black text-blue-900 tracking-tight">Library <span class="text-blue-500">Analytics</span></h1>
            
            <div class="flex space-x-4 mt-4 md:mt-0">
                <select class="border rounded-md px-3 py-1 text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option>2024 年度</option>
                    <option>2023 年度</option>
                    <option>近三年趨勢</option>
                </select>
                <select class="border rounded-md px-3 py-1 text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option>所有學科類別</option>
                    <option>應用科學</option>
                    <option>社會科學</option>
                    <option>語文類</option>
                </select>
                <button class="bg-blue-600 text-white px-4 py-1 rounded-md text-sm hover:bg-blue-700 transition">更新數據</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="kpi-card bg-white p-6 rounded-xl shadow-sm border-b-4 border-blue-500">
                <h4 class="text-gray-400 text-xs font-bold uppercase tracking-wider">年度總周轉率 (TR)</h4>
                <div class="flex items-end space-x-2 mt-2">
                    <span class="text-4xl font-bold text-gray-900">4.21</span>
                    <span class="text-green-500 text-sm font-semibold mb-1">▲ 8.4%</span>
                </div>
            </div>
            <div class="kpi-card bg-white p-6 rounded-xl shadow-sm border-b-4 border-purple-500">
                <h4 class="text-gray-400 text-xs font-bold uppercase tracking-wider">高壓力預約比 (HCR > 5)</h4>
                <div class="flex items-end space-x-2 mt-2">
                    <span class="text-4xl font-bold text-gray-900">12</span>
                    <span class="text-gray-500 text-sm mb-1">個學科類別</span>
                </div>
            </div>
            <div class="kpi-card bg-white p-6 rounded-xl shadow-sm border-b-4 border-green-500">
                <h4 class="text-gray-400 text-xs font-bold uppercase tracking-wider">每借閱成本 (CPU)</h4>
                <div class="flex items-end space-x-2 mt-2">
                    <span class="text-4xl font-bold text-gray-900">$12.5</span>
                    <span class="text-blue-500 text-sm mb-1">優於去年</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-lg text-gray-700">各學科預算與借閱佔比 (雙軸對照)</h3>
                    <span class="text-[10px] bg-blue-100 text-blue-600 px-2 py-1 rounded font-bold uppercase">Budget vs Circulation</span>
                </div>
                <div class="chart-container">
                    <canvas id="comboChart"></canvas>
                </div>
                <p class="mt-4 text-xs text-gray-400 italic">註：綠色折線超過藍色長條者，代表該學科處於「高需求、低預算」狀態。</p>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-lg text-gray-700">館藏贡献度分析 (Pareto Chart)</h3>
                    <span class="text-[10px] bg-purple-100 text-purple-600 px-2 py-1 rounded font-bold uppercase">80/20 Analysis</span>
                </div>
                <div class="chart-container">
                    <canvas id="paretoChart"></canvas>
                </div>
                <p class="mt-4 text-xs text-gray-400 italic">註：累積百分比線（橘色）可找出貢獻 80% 借閱量的核心 20% 館藏。</p>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm lg:col-span-2">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-lg text-gray-700">近五年館藏周轉率趨勢 (TR Trend)</h3>
                    <div class="flex space-x-2">
                        <span class="flex items-center text-xs text-gray-500"><span class="w-3 h-3 bg-blue-500 rounded-full mr-1"></span> 應用科學</span>
                        <span class="flex items-center text-xs text-gray-500"><span class="w-3 h-3 bg-orange-400 rounded-full mr-1"></span> 史地文學</span>
                    </div>
                </div>
                <div class="chart-container" style="height: 300px;">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 設定配色 (對應第五部分建議)
        const colors = {
            blue: 'rgba(59, 130, 246, 0.7)',
            green: '#22c55e',
            orange: '#fb923c',
            purple: 'rgba(168, 85, 247, 0.7)',
            grid: '#f3f4f6'
        };

        // 1. 雙軸複合圖實作
        new Chart(document.getElementById('comboChart'), {
            type: 'bar',
            data: {
                labels: ['總類', '哲學', '自然科學', '應用科學', '社會科學', '史地', '語文', '藝術'],
                datasets: [{
                    label: '預算佔比 (%)',
                    data: [5, 3, 12, 35, 20, 8, 12, 5],
                    backgroundColor: colors.blue,
                    borderRadius: 4
                }, {
                    label: '實際借閱佔比 (%)',
                    data: [8, 2, 15, 45, 12, 5, 18, 4],
                    type: 'line',
                    borderColor: colors.green,
                    borderWidth: 3,
                    pointBackgroundColor: colors.green,
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { color: colors.grid } } } }
        });

        // 2. 帕累托圖實作
        new Chart(document.getElementById('paretoChart'), {
            type: 'bar',
            data: {
                labels: ['核心學術', '流行文學', '考用檢定', '生活風格', '兒童圖書', '其他'],
                datasets: [{
                    label: '借閱次數',
                    data: [5000, 3000, 1500, 800, 400, 200],
                    backgroundColor: colors.purple,
                    order: 2
                }, {
                    label: '累積百分比',
                    data: [45, 72, 85, 93, 97, 100],
                    type: 'line',
                    borderColor: colors.orange,
                    yAxisID: 'y1',
                    order: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true },
                    y1: { position: 'right', max: 100, grid: { display: false }, ticks: { callback: v => v + '%' } }
                }
            }
        });

        // 3. 趨勢折線圖實作
        new Chart(document.getElementById('trendChart'), {
            type: 'line',
            data: {
                labels: ['2020', '2021', '2022', '2023', '2024'],
                datasets: [{
                    label: '應用科學',
                    data: [3.2, 3.8, 4.2, 4.9, 5.8],
                    borderColor: '#3b82f6',
                    fill: true,
                    backgroundColor: 'rgba(59, 130, 246, 0.05)',
                    tension: 0.3
                }, {
                    label: '史地文學',
                    data: [2.5, 2.3, 2.1, 1.8, 1.4],
                    borderColor: '#fb923c',
                    tension: 0.3
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    </script>
</body>
</html>
